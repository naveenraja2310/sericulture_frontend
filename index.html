<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <title>Sericulture IOT</title>
  </head>
  <body>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ0hFdQSmhYtW1Sz7fjOJCxKDzP2fPJb0",
            authDomain: "yadhronics.firebaseapp.com",
            projectId: "yadhronics",
            messagingSenderId: "15512986021",
            appId: "1:15512986021:web:07e08c346d935b9093484c"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        window.getFcmToken = async () => {
          try {
            if (Notification.permission !== "granted") {
              return null;
            }

            const registrations = await navigator.serviceWorker.getRegistrations();

            const firebaseSW = registrations.find(
              r => r.active?.scriptURL.includes("firebase-messaging-sw.js")
            );

            console.log(
              "Using Firebase SW:",
              firebaseSW?.active?.scriptURL
            );

            if (!firebaseSW) {
              throw new Error("firebase-messaging-sw.js not found");
            }

            const token = await getToken(messaging, {
              vapidKey: "BMVQ-t-SPMfnZu6ygT8448jmt9M4Nat1IeEQfiNAvvYZ0DI3S0GXhQQIfzfuGpSjA1JIJbI6IY4qZtIHRkSXqWY",
              serviceWorkerRegistration: firebaseSW,
            });

            if (token) return token;

            // Fallback: try retrieving token without explicitly passing SW registration
            try {
              const tokenFallback = await getToken(messaging, {
                vapidKey: "BMVQ-t-SPMfnZu6ygT8448jmt9M4Nat1IeEQfiNAvvYZ0DI3S0GXhQQIfzfuGpSjA1JIJbI6IY4qZtIHRkSXqWY"
              });
              console.log("FCM Token (fallback):", tokenFallback);
              return tokenFallback || null;
            } catch (e) {
              console.warn('Fallback getToken error:', e);
            }
            return null;
          } catch (err) {
            console.error("Error getting FCM token:", err);
            return null;
          }
        };

        onMessage(messaging, (payload) => {
          console.log("Foreground message:", payload);

          if (payload.notification) {
            return;
          }

          const title = payload.data?.title || "Notification";
          const body = payload.data?.body || "";
          const url = payload.data?.url || "/dashboard";

          if (Notification.permission === "granted") {
            if (navigator.serviceWorker && navigator.serviceWorker.ready) {
              navigator.serviceWorker.ready
                .then((reg) => {
                  if (reg && reg.showNotification) {
                    reg.showNotification(title, {
                      body,
                      icon: "/icons/icon-192.png",
                      badge: "/icons/icon-192.png",
                      data: { url },
                    });
                    return;
                  }
                  // Fallback to in-page Notification
                  new Notification(title, { body, icon: "/icons/icon-192.png" });
                })
                .catch((err) => {
                  console.warn("Service worker registration not ready, using Notification():", err);
                  new Notification(title, { body, icon: "/icons/icon-192.png" });
                });
            } else {
              // No service worker support — show a page notification
              new Notification(title, { body, icon: "/icons/icon-192.png" });
            }
          }
        });
    </script>
  </body>
</html>
