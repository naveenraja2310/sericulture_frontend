<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <title>Sericulture IOT</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZ0hFdQSmhYtW1Sz7fjOJCxKDzP2fPJb0",
            authDomain: "yadhronics.firebaseapp.com",
            projectId: "yadhronics",
            messagingSenderId: "15512986021",
            appId: "1:15512986021:web:07e08c346d935b9093484c"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Expose helper to request permission and retrieve FCM token after login
        window.getFcmToken = async () => {
          try {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
              const token = await getToken(messaging, {
                vapidKey: "BMVQ-t-SPMfnZu6ygT8448jmt9M4Nat1IeEQfiNAvvYZ0DI3S0GXhQQIfzfuGpSjA1JIJbI6IY4qZtIHRkSXqWY"
              });

              console.log("FCM Token:", token);
              return token;
            }
          } catch (err) {
            console.error('Error getting FCM token', err);
          }
          return null;
        };

        onMessage(messaging, (payload) => {
          console.log("Foreground message:", payload);

          const title = payload.data?.title || "Notification";
          const body = payload.data?.body || payload.notification?.body || "";
          const url = payload.data?.url || "/dashboard";

          const notification = new Notification(title, {
            body,
            data: { url },
          });

          notification.onclick = () => {
            window.focus();
            window.location.href = url;
          };
        });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
